name: pism-terra
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip
  # runtime requirements
  - awscrt  # boto3 extra needed
  - boto3
  - botocore
  - python-cdo
  - cf_xarray
  - cfgrib
  - cftime
  - cmap
  - cmweather
  - dask
  - distributed   # dask[distributed,dataframe] is dask and distributed for conda
  - dem_stitcher
  - earthaccess
  - ecmwf-datastores-client
  - geocube
  - geopandas
  - jinja2
  - joblib
  - libgdal-core
  - libgdal-hdf5
  - libgdal-netcdf
  - matplotlib
  - nc-time-axis
  - h5py
  - hdf5
  - netCDF4
  - numpy
  - pandas
  - pint-xarray
  - pyamg
  - pyarrow
  - pydantic
  - pyfiglet
  - pyogrio
  - pyproj
  - pytest
  - rasterio
  - requests
  - rioxarray
  - s3fs
  - scikit-learn
  - scipy
  - shapely
  - toml
  - tqdm
  - xarray
  - xarray-regrid
  - zarr
  # pism-cloud Voila app (notebooks/pism_cloud_app.ipynb)
  - hyp3_sdk
  - ipywidgets
  - voila
  # for development and testing
  - black
  - jupyterlab
  - pre-commit
  - pylint
  - pytest
  - pytest-cov
  - setuptools_scm>=6.2
  # conda-forge tops out at pytest-codeblocks 0.17.0, which still uses the
  # pytest_collect_file(path=...) hook removed in pytest 9.1. Only 0.18.0
  # (PyPI-only) switched to the new file_path signature, so install via pip.
  - pip:
      - pytest-codeblocks>=0.18
