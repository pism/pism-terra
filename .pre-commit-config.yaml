exclude: "docs/_build|docs/source/auto_examples|docs/source/reference/generated|node_modules|migrations|.git|.tox"
default_stages: [pre-commit]
fail_fast: true

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-toml
      - id: check-yaml
        exclude: conda/meta.yaml

  # Can run individually with `pre-commit run black --all-files`
  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black

  # Can run individually with `pre-commit run isort --all-files`
  - repo: https://github.com/timothycrosley/isort
    rev: 9.0.0a3
    hooks:
      - id: isort
        args:
          - --profile
          - black


  # Numpydoc
  - repo: https://github.com/numpy/numpydoc
    rev: v1.10.0
    hooks:
      - id: numpydoc-validation
        exclude: ^pism_terra/kitp/writer\.py$

  # Can run individually with `pre-commit run mypy --all-files`
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        args: ["--config-file", "pyproject.toml", "--ignore-missing-imports"]
        exclude: ^pism_terra/kitp/writer\.py$
        additional_dependencies: [types-toml, types-requests]


  - repo: https://github.com/srstevenson/nb-clean
    rev: 4.0.1
    hooks:
     - id: nb-clean

  - repo: local
    hooks:
      - id: pylint
        name: pylint
        entry: pylint
        language: system
        types: [python]
        require_serial: true
        exclude: ^pism_terra/kitp/writer\.py$
        args:
          [
            "-rn", # Only display messages
            "-sn", # Don't display the score
            "--extension-pkg-whitelist=scipy",
          ]


  - repo: local
    hooks:
    - id: pytest
      name: pytest
      entry: pytest tests
      language: system
      types: [python]
      exclude: ^venv/ ^.git/ ^.vscode/ ^.DS_Store ^uq/ ^hindcasts/
      always_run: true
      pass_filenames: false
      stages: [pre-push]
