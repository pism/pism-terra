[run]

executable = "pism"
mpi = "mpirun -np  {{ ntasks }}"
ntasks = 40

[job]

queue = "t2small"
walltime = "48:00:00"
nodes = 1

[run_info]

'run_info.institution' = "University of Alaska Fairbanks"
'run_info.title' = "PISM-TERRA ISMIP7 Greenland Historical Run"

[campaign]

pathway = "historical"
version = "1"
start_year = "1975"
end_year = "2015"
gcm = "CESM2-WACCM"
boot_file = "boot_GreenlandObsISMIP7-v1.3.nc"
grid_file = "ismip7_greenland_grid.nc"
regrid_file = "g600m_id_BAYES-MEDIAN_1980-1-1_1984-12-31.nc"
retreat_file = "pism_g450m_frontretreat_calfin_1972_2019_ME.nc"

[time]

'time.start' = "1980-01-01"
'time.end' =  "2015-01-01"
'time.calendar' =  "standard"
'time.reference_date' = "1978-01-01"

[time_stepping]

'time_stepping.adaptive_ratio' = 250
'time_stepping.skip.enabled' = "yes"
'time_stepping.skip.max' = 100

['geometry']

'geometry.front_retreat.use_cfl' = 'yes'
'geometry.part_grid.enabled' = 'yes'
'geometry.remove_icebergs' = 'yes'

['input']

'input.bootstrap' = "yes"
'input.forcing.time_extrapolation' = "yes"
'input.forcing.buffer_size' = 13
'input.regrid.file' =  "none"
'input.regrid.vars' = "litho_temp,enthalpy,age,tillwat,bmelt,ice_area_specific_volume,thk"

[reporting]

'output.format' = "netcdf4_parallel"
'output.compression_level'= 2
'output.size' = "medium"
'output.sizes.medium' = "sftgif,velsurf_mag,mask,usurf"
'output.extra.file' = "none"
'output.extra.times' = "monthly"
'output.extra.vars' = "effective_air_temp,effective_precipitation,ice_surface_temp,climatic_mass_balance,thk,velsurf_mag,velbase_mag,mask,usurf"
'output.checkpoint.interval' = 24
'output.extra.stop_missing' = 'no'
'output.ISMIP6' = "yes"

[grid]

resolution = "1km"
'grid.Lbz' = 2000
'grid.Lz' = 4000
'grid.Mbz' = 101
'grid.Mz' = 201
'grid.registration' = "center"
'grid.allow_extrapolation' = "yes"

[energy]

model = "enthalpy"

[energy.options.enthalpy]

'energy.model' = "enthalpy"
'stress_balance.blatter.flow_law' = "gpbld"
'stress_balance.sia.flow_law' = "gpbld"
'stress_balance.ssa.flow_law' = "gpbld"

[stress_balance]

model = 'hybrid'

[stress_balance.options.blatter]

'stress_balance.model' = "blatter"
'stress_balance.blatter.Mz' = 17
'stress_balance.blatter.coarsening_factor' = 4
'stress_balance.blatter.use_eta_transform' = 'yes'
'stress_balance.calving_front_stress_bc' = 'yes'
'stress_balance.sia.surface_gradient_method' = 'eta'
'stress_balance.sia.max_diffusivity' = 100000.0
bp_ksp_monitor =  ""
bp_ksp_view_singularvalues = ""
bp_snes_monitor_ratio = ""
bp_pc_type = "mg"
bp_mg_levels_ksp_type = "richardson"
bp_mg_levels_pc_type ="sor"
bp_mg_coarse_ksp_type = "preonly"
bp_mg_coarse_pc_type = "lu"
bp_pc_mg_levels = 3
bp_snes_ksp_ew = 1
bp_snes_ksp_ew_version = 3
bp_snes_rtol = 1e-3
bp_ksp_rtol = 1e-3

[stress_balance.options.hybrid]

'stress_balance.model' = "ssa+sia"
'stress_balance.ssa.method' = "fd"
'stress_balance.calving_front_stress_bc' = 'yes'
'stress_balance.sia.surface_gradient_method' = 'eta'
'stress_balance.sia.max_diffusivity' = 100000.0

[iceflow]

'basal_resistance.pseudo_plastic.enabled' = 'yes'
'basal_resistance.pseudo_plastic.q' = 0.7508221
'basal_yield_stress.model' = 'mohr_coulomb'
'basal_yield_stress.mohr_coulomb.till_effective_fraction_overburden' = 0.01845403
'basal_yield_stress.mohr_coulomb.topg_to_phi.enabled' = "yes"
'basal_yield_stress.mohr_coulomb.topg_to_phi.phi_max' = 42.79528
'basal_yield_stress.mohr_coulomb.topg_to_phi.phi_min' = 7.193718
'basal_yield_stress.mohr_coulomb.topg_to_phi.topg_max' = 243.8239
'basal_yield_stress.mohr_coulomb.topg_to_phi.topg_min' = -369.6359
'stress_balance.blatter.enhancement_factor' = 2.608046
'stress_balance.sia.enhancement_factor' = 2.608046
'stress_balance.ssa.Glen_exponent' = 3.309718

[surface]

model = "given"

[surface.options.given]

'surface.models' = "given"
'surface.given.file' = "none"

[calving]

'calving.methods' = 'vonmises_calving'
'calving.vonmises_calving.sigma_max' = 7.5e5

[atmosphere]

model = "given"

[atmosphere.options.given]

'atmosphere.models' = "given"
'atmosphere.given.file' = "none"

[ocean]

'ocean.models' = "th"
'ocean.th.file' = "none"
'ocean.th.clip_salinity' = "False"
