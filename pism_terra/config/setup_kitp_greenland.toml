ismip7_to_pism = {"acabf" = "climatic_mass_balance", "runoff" = "water_input_rate", "tas" = "ice_surface_temp", "TF" = "theta_ocean", "geothermal_heat_flux1" = "bheatflx"}
gcms = ["CESM1-WACCM-SC"]
version = "v3"
bucket = "pism-cloud-data"
prefix = "input"
baseline = "carra2"

[domain]

x_bounds = [-653000.0, 879700.0]
y_bounds = [-3384350.0, -632750.0]
resolution = "900m"

[forcing]

bucket = "pism-cloud-data"
prefix = "kitp_forcing"
present_day_forcings = ["pdSST-pdSIC", "pdSST-pdSICSIT", "pa-pdSIC-ext"]
future_forcings = ["futSST-pdSIC", "pdSST-futArcSIC", "pa-futArcSIC-ext"]

[climatology]

hirham5 = {"start_year" = 1990, "end_year" = 2019}
carra2 = {"year" = [1986, 1987, 1988, 1991, 1992, 1993, 1996, 1997, 1998, 2001, 2002, 2003, 2006, 2007, 2008, 2011, 2012, 2013, 2016, 2017, 2018, 2021, 2022, 2023]}
